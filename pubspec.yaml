name: medsafe
description: "Intelligent Medication Safety & Adherence Monitoring System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  supabase_flutter: ^2.5.0
  http: ^1.2.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  fl_chart: ^0.65.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  uuid: ^4.3.3
  google_fonts: ^6.1.0
  image_picker: ^1.1.2
  google_generative_ai: ^0.4.6
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "icon.png"

flutter:
  uses-material-design: true
